service: poro-guess-api

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-1
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL}

package:
  individually: false
  patterns:
    - '!**'
    - 'dist/lambda.js'
    - 'node_modules/bcrypt/**'

functions:
  main:
    handler: dist/lambda.handler
    timeout: 29
    memorySize: 512
    events:
      - http:
          method: ANY
          path: /
          cors: true
      - http:
          method: ANY
          path: '{proxy+}'
          cors: true
