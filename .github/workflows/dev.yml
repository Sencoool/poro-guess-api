name: CI/CD Pipeline

on:
  push:
    branches:
      - dev 
  pull_request:

# CI
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poro_guess
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/poro_guess
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poro_guess
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poro_guess"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Unit Tests
        run: npm run test

      - name: Build Project
        run: npm run build
        
      - name: Run E2E Tests
        run: npm run test:e2e