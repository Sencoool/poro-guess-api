name: CI/CD Pipeline

on:
  push:
    branches:
      - main 
  pull_request:

# CI
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poro_guess
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/poro_guess
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poro_guess
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poro_guess"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Unit Tests
        run: npm run test

      - name: Build Project
        run: npm run build
        
      - name: Run E2E Tests
        run: npm run test:e2e

# CD

  deploy-to-aws:
    name: Deploy to AWS Lambda
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Bundle for Lambda with esbuild
        # Bundle all dependencies into a single file to keep package size well under Lambda's 250 MB limit.
        # bcrypt is kept external because it uses a native binary (.node) that must be deployed as-is.
        run: |
          npx esbuild dist/src/main.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=cjs \
            --outfile=dist/lambda.js \
            --external:bcrypt \
            --external:pg-native \
            --external:@nestjs/microservices \
            --external:@nestjs/websockets \
            --external:cache-manager \
            --external:class-transformer/storage

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Deploy via Serverless Framework
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: serverless deploy --stage production